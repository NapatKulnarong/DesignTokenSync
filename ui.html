<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; padding: 16px; margin: 0; background-color: #f8fafc; color: #0f172a; }
    input { width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #cbd5e1; font-size: 13px; margin-bottom: 12px; box-sizing: border-box; }
    button { width: 100%; padding: 12px; border-radius: 6px; font-size: 14px; margin-bottom: 12px; box-sizing: border-box; background-color: #0048FF; color: white; border: none; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    button:hover { background-color: #003BD3; }
    button:disabled { background-color: #cbd5e1; cursor: not-allowed; }
    #apply-btn { background-color: #16a34a; display: none; }
    #apply-btn:hover { background-color: #15803d; }
    .change-log-box { background: #ffffff; border: 1px solid #e2e8f0; border-radius: 6px; padding: 12px; height: 220px; overflow-y: auto; font-size: 12px; margin-bottom: 12px; }
    .log-item { margin-bottom: 4px; font-family: monospace; }
    .added { color: #16a34a; font-weight: 600; }
    .modified { color: #d97706; font-weight: 600; }
    .deleted { color: #dc2626; font-weight: 600; }
    .label { font-size: 12px; font-weight: 600; color: #475569; margin-bottom: 6px; }
    .token-section { background: #f1f5f9; padding: 10px; border-radius: 6px; margin-bottom: 12px; }
  </style>
</head>
<body>

  <div class="token-section">
    <div class="label">Config: Secure GitHub PAT Token (ghp_...)</div>
    <input type="password" id="token-input" placeholder="Paste fresh ghp_ token here...">
    <button id="save-token-btn" style="background:#475569; padding:6px; font-size:12px; margin:0;">Save Token Locally</button>
  </div>

  <button id="compare-btn">1. Fetch & Compare All Collections with HackMD</button>
  
  <div class="label">Review System Modifications:</div>
  <div id="changelog" class="change-log-box">Click above to run a complete workspace validation scan...</div>
  
  <button id="apply-btn">2. Apply Color Updates to HackMD.io</button>

  <script>
    let remoteTokens = {};
    let fullOriginalMarkdown = "";
    let fileSha = "";
    let localGroupedYaml = {};

    function parseTokensFromMarkdown(mdContent) {
      const tokens = {};
      const codeBlockRegex = /```yaml([\s\S]*?)```/g;
      let match;
      while ((match = codeBlockRegex.exec(mdContent)) !== null) {
        match[1].split('\n').forEach(line => {
          const trimmed = line.trim();
          if (!trimmed || trimmed.startsWith('#')) return;
          const parts = trimmed.split(':');
          if (parts.length >= 2) {
            tokens[parts[0].trim()] = parts.slice(1).join(':').trim().replace(/^"|"$/g, '');
          }
        });
      }
      return tokens;
    }

    document.getElementById('save-token-btn').onclick = () => {
      const token = document.getElementById('token-input').value.trim();
      if(!token) return alert("Please input a token string!");
      parent.postMessage({ pluginMessage: { type: 'SAVE_TOKEN', token } }, '*');
    };

    document.getElementById('compare-btn').onclick = () => {
      document.getElementById('compare-btn').disabled = true;
      document.getElementById('changelog').innerText = "Fetching source data via secure backend bridge...";
      parent.postMessage({ pluginMessage: { type: 'FETCH_FROM_GITHUB' } }, '*');
    };

    window.onmessage = (event) => {
      const message = event.data.pluginMessage;
      if (!message) return;

      if (message.type === 'ERROR') {
        document.getElementById('changelog').innerHTML = `<span style='color:red;'>${message.message}</span>`;
        document.getElementById('compare-btn').disabled = false;
        document.getElementById('apply-btn').disabled = false;
        document.getElementById('apply-btn').innerText = "2. Apply Color Updates to HackMD.io";
        return;
      }

      if (message.type === 'GITHUB_FETCH_SUCCESS') {
        const data = message.payload;
        fileSha = data.sha;
        fullOriginalMarkdown = decodeURIComponent(escape(atob(data.content)));
        remoteTokens = parseTokensFromMarkdown(fullOriginalMarkdown);
        parent.postMessage({ pluginMessage: { type: 'EXTRACT_ALL_TOKENS' } }, '*');
        return;
      }

      if (message.type === 'TOKENS_EXTRACTED') {
        const tokens = message.payload;
        let logHTML = "";
        let localTokenKeys = new Set();
        const modeMap = { 1: 'light', 2: 'dark' };
        
        localGroupedYaml = {};

        tokens.forEach(token => {
          if (token.name.startsWith('hide/')) return;
          
          if (!localGroupedYaml[token.collection]) {
            localGroupedYaml[token.collection] = "";
          }

          const modeIds = Object.keys(token.values);
          const checkDiff = (key, val) => {
            localTokenKeys.add(key);
            if (remoteTokens[key] === undefined) {
              logHTML += `<div class="log-item added">[ADDED] ${key}: "${val}"</div>`;
            } else if (remoteTokens[key] !== val) {
              logHTML += `<div class="log-item modified">[MODIFIED] ${key}: "${remoteTokens[key]}" ➔ "${val}"</div>`;
            }
          };

          if (modeIds.length === 1) {
            const val = token.values[modeIds[0]];
            localGroupedYaml[token.collection] += `${token.name}: "${val}"\n`;
            checkDiff(token.name, val);
          } else {
            const firstVal = token.values[modeIds[0]];
            const allModesIdentical = modeIds.every(mId => token.values[mId] === firstVal);

            if (allModesIdentical) {
              localGroupedYaml[token.collection] += `${token.name}: "${firstVal}"\n`;
              checkDiff(token.name, firstVal);
            } else {
              modeIds.forEach((modeId, index) => {
                const modeSuffix = modeMap[index + 1] || `mode_${index + 1}`;
                const keyName = `${token.name}-${modeSuffix}`;
                const val = token.values[modeId];
                localGroupedYaml[token.collection] += `${keyName}: "${val}"\n`;
                checkDiff(keyName, val);
              });
            }
          }
        });

        Object.keys(remoteTokens).forEach(remoteKey => {
          const nonColorKeywords = ['logo', 'favicon', 'h1', 'h2', 'h3', 'h4', 'h5', 'h6', 'text-', 'font', 'lineHeight', 'component', 'width', 'height', 'padding', 'rounded', 'usage', 'surface', 'textDecoration', 'position', 'behavior', 'collapsible', 'overflow'];
          if (nonColorKeywords.some(keyword => remoteKey.toLowerCase().includes(keyword))) return;

          if (!localTokenKeys.has(remoteKey)) {
            logHTML += `<div class="log-item deleted">[REMOVED FROM FIGMA] ${remoteKey}</div>`;
          }
        });

        document.getElementById('changelog').innerHTML = logHTML || `<div style="color: #64748b;">✓ No color structural changes detected. Your documentation is up to date.</div>`;
        document.getElementById('compare-btn').disabled = false;
        document.getElementById('apply-btn').style.display = logHTML ? 'block' : 'none';
        return;
      }

      if (message.type === 'GITHUB_PUSH_SUCCESS') {
        document.getElementById('changelog').innerHTML = "<div style='color:#16a34a; font-weight:bold;'>🎉 SUCCESS! Colors updated inside HackMD.io template blocks securely!</div>";
        document.getElementById('apply-btn').style.display = 'none';
        document.getElementById('apply-btn').disabled = false;
        document.getElementById('apply-btn').innerText = "2. Apply Color Updates to HackMD.io";
        return;
      }
    };

    document.getElementById('apply-btn').onclick = () => {
      document.getElementById('apply-btn').disabled = true;
      document.getElementById('apply-btn').innerText = "Deploying surgical updates...";
      
      let updatedMarkdown = fullOriginalMarkdown;

      // 1. SURGICAL REPLACEMENT: Map 'shadcn theme' directly into clean mode structures
      if (localGroupedYaml["shadcn theme"]) {
        const lines = localGroupedYaml["shadcn theme"].split('\n');
        let lightTokens = {};
        let darkTokens = {};
        let backgroundBodyToken = 'background-body: "{tailwind.base.black}"';

        lines.forEach(line => {
          if (!line.trim()) return;
          
          // Separate clean lines by light/dark suffix
          if (line.includes('-light:')) {
            const cleanKey = line.split('-light:')[0].trim() + '-light';
            const value = line.split('-light:')[1].trim();
            lightTokens[cleanKey] = value;
          } else if (line.includes('-dark:')) {
            const cleanKey = line.split('-dark:')[0].trim() + '-dark';
            const value = line.split('-dark:')[1].trim();
            darkTokens[cleanKey] = value;
          } else if (line.startsWith('background-body:')) {
            backgroundBodyToken = line;
          }
        });

        // Update Application Shell Code block
        const shellRegex = /(## Application Shell[\s\S]*?```yaml\n)([\s\S]*?)(```)/g;
        if (shellRegex.test(updatedMarkdown)) {
          updatedMarkdown = updatedMarkdown.replace(shellRegex, `$1${backgroundBodyToken}\n$3`);
        }

        // Clean replacement for Light Mode Blocks inside your exact subsections
        const lightSectionMap = {
          "### Background": ["background-light", "inverse-light", "white", "black", "transparent"],
          "### Surface": ["card-light", "card-low-light", "card-high-light", "popover-light", "muted-light"],
          "### Foreground": ["foreground-light", "subtle-foreground-light", "muted-foreground-light", "inverse-foreground-light", "card-foreground-light", "popover-foreground-light"],
          "### Brand & Accent": ["primary-light", "primary-foreground-light", "primary-subtle-light", "primary-outline-light", "secondary-light", "secondary-foreground-light", "secondary-subtle-light", "secondary-outline-light", "accent-light", "accent-foreground-light", "accent-subtle-light", "accent-outline-light"],
          "### Semantic": ["destructive", "destructive-foreground", "destructive-subtle", "warning", "warning-foreground", "warning-subtle-foreground", "warning-subtle", "success", "success-foreground", "success-subtle", "purple", "purple-foreground", "purple-subtle", "orange", "orange-foreground", "orange-subtle", "brown-light", "brown-foreground", "brown-subtle-light"],
          "### Border & Ring": ["border-light", "input-light", "ring-light", "destructive-outline", "warning-outline", "success-outline", "purple-outline", "orange-outline", "brown-outline-light"],
          "### Sidebar": ["sidebar", "sidebar-hover", "sidebar-foreground", "sidebar-active", "sidebar-divider", "sidebar-accent", "sidebar-accent-foreground", "sidebar-border-light", "sidebar-ring", "hover-white"],
          "### Appbar": ["appbar", "appbar-hover", "appbar-foreground", "appbar-active", "appbar-active-foreground", "appbar-accent", "appbar-accent-foreground", "appbar-border"]
        };

        for (const [subHeader, tokenKeys] of Object.entries(lightSectionMap)) {
          let blockYaml = "";
          tokenKeys.forEach(key => {
            if (lightTokens[key]) blockYaml += `${key}: ${lightTokens[key]}\n`;
          });

          const subBlockRegex = new RegExp(`(${subHeader}[\\s\\S]*?```yaml\\n)([\\s\\S]*?)(```)`, 'g');
          if (subBlockRegex.test(updatedMarkdown) && blockYaml) {
            updatedMarkdown = updatedMarkdown.replace(subBlockRegex, `$1${blockYaml}$3`);
          }
        }

        // Clean replacement for Dark Mode Blocks inside your exact subsections
        const darkSectionMap = {
          "### Background": ["background-dark", "inverse-dark", "white", "black", "transparent"],
          "### Surface": ["card-dark", "card-low-dark", "card-high-dark", "popover-dark", "muted-dark"],
          "### Foreground": ["foreground-dark", "subtle-foreground-dark", "muted-foreground-dark", "inverse-foreground-dark", "card-foreground-dark", "popover-foreground-dark"],
          "### Brand & Accent": ["primary-dark", "primary-foreground-dark", "primary-subtle-dark", "primary-outline-dark", "secondary-dark", "secondary-foreground-dark", "secondary-subtle-dark", "secondary-outline-dark", "accent-dark", "accent-foreground-dark", "accent-subtle-dark", "accent-outline-dark"],
          "### Semantic": ["destructive", "destructive-foreground", "destructive-subtle", "warning", "warning-foreground", "warning-subtle-foreground", "warning-subtle", "success", "success-foreground", "success-subtle", "purple", "purple-foreground", "purple-subtle", "orange", "orange-foreground", "orange-subtle", "brown-dark", "brown-foreground", "brown-subtle-dark"],
          "### Border & Ring": ["border-dark", "input-dark", "ring-dark", "destructive-outline", "warning-outline", "success-outline", "purple-outline", "orange-outline", "brown-outline-dark"],
          "### Sidebar": ["sidebar", "sidebar-hover", "sidebar-foreground", "sidebar-active", "sidebar-divider", "sidebar-accent", "sidebar-accent-foreground", "sidebar-border-dark", "sidebar-ring", "hover-white"],
          "### Appbar": ["appbar", "appbar-hover", "appbar-foreground", "appbar-active", "appbar-active-foreground", "appbar-accent", "appbar-accent-foreground", "appbar-border"]
        };

        // Select everything inside '## 2. Dark Mode' section context
        let darkSectionPart = updatedMarkdown.split('## 2. Dark Mode')[1] || "";
        for (const [subHeader, tokenKeys] of Object.entries(darkSectionMap)) {
          let blockYaml = "";
          tokenKeys.forEach(key => {
            if (darkTokens[key]) blockYaml += `${key}: ${darkTokens[key]}\n`;
          });

          const subBlockRegex = new RegExp(`(${subHeader}[\\s\\S]*?```yaml\\n)([\\s\\S]*?)(```)`, 'g');
          if (subBlockRegex.test(darkSectionPart) && blockYaml) {
            darkSectionPart = darkSectionPart.replace(subBlockRegex, `$1${blockYaml}$3`);
          }
        }
        
        // Stitch Dark Mode changes back safely
        if (updatedMarkdown.includes('## 2. Dark Mode')) {
          updatedMarkdown = updatedMarkdown.split('## 2. Dark Mode')[0] + '## 2. Dark Mode' + darkSectionPart;
        }
      }

      // 2. SURGICAL REPLACEMENT: Map 'Tailwind Colors' items into separate Palette sections natively
      if (localGroupedYaml["Tailwind Colors"]) {
        const colorLines = localGroupedYaml["Tailwind Colors"].split('\n');
        const colorGroups = {};

        colorLines.forEach(line => {
          if (!line.trim()) return;
          const parts = line.split('/');
          if (parts.length > 1) {
            const groupName = parts[0].trim();
            // Restores dot notation syntax to match your existing document fields exactly
            const formattedLine = `tailwind.${groupName}.${line.replace(`${groupName}/`, '')}`;
            if (!colorGroups[groupName]) colorGroups[groupName] = [];
            colorGroups[groupName].push(formattedLine);
          }
        });

        for (const [groupName, linesList] of Object.entries(colorGroups)) {
          const capitalizedHeader = groupName.charAt(0).toUpperCase() + groupName.slice(1);
          const blockRegex = new RegExp(`(## ${capitalizedHeader}\\n\\n\`\`\`yaml\\n)([\\s\\S]*?)(\`\`\`)`, 'g');
          
          if (blockRegex.test(updatedMarkdown)) {
            updatedMarkdown = updatedMarkdown.replace(blockRegex, `$1${linesList.join('\n')}\n$3`);
          }
        }
      }

      const base64Content = btoa(unescape(encodeURIComponent(updatedMarkdown)));
      const commitMsg = "style: automated clean token realignment mapping sync";

      parent.postMessage({ 
        pluginMessage: { 
          type: 'PUSH_TO_GITHUB', 
          content: base64Content, 
          commitMessage: commitMsg, 
          sha: fileSha 
        } 
      }, '*');
    };
  </script>
</body>
</html>
